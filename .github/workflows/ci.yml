name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: assignment_roaster_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/assignment_roaster_test
          SECRET_KEY: ci-test-secret-key
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          GOOGLE_CLIENT_ID: ci-test-client-id
          GOOGLE_CLIENT_SECRET: ci-test-client-secret
          LLM_API_KEY: ci-test-llm-key
          VITE_API_URL: http://localhost:5173
        run: pytest --maxfail=1 --disable-warnings

  frontend:
    name: Frontend (lint + type-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type-check
        run: npx tsc -b --noEmit

      - name: Build
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build
